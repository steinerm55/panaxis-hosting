<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hallo-car.ch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2rem;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: #e94560;
            margin: 0 auto 2rem;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #b0b0b0;
            margin-bottom: 2rem;
        }
        .message p { margin-bottom: 0.5rem; }
        .contact a {
            color: #e94560;
            text-decoration: none;
        }
        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>hallo-car.ch</h1>
        <div class="divider"></div>
        <div class="message">
            <p>Diese Website wird gerade erstellt.</p>
            <p>This website is under construction.</p>
            <p>Ce site est en cours de construction.</p>
            <p>Questo sito è in costruzione.</p>
        </div>
        <div class="contact">
            <a href="mailto:info@hallo-car.ch">info@hallo-car.ch</a>
        </div>
    </div>
</body>
</html>
